# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'

# Set terminal for macOS compatibility and true color support
set-option -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc"
set -g status-bg default
set -g window-style 'bg=default'
set -g pane-border-style 'bg=default'
set -g pane-active-border-style 'bg=default'

# Ensure ARM64 shell compatibility
set-option -g default-command "arch -arch arm64 /bin/zsh"

# Improve responsiveness
set -s escape-time 0

# Enable mouse support for scrolling and pane selection
set -g mouse on

# Increase scrollback buffer
set -g history-limit 50000

# Set prefix to Ctrl+s
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Split panes using f (horizontal) and v (vertical)
bind f split-window -h
bind v split-window -v
unbind '"'
unbind %

# Navigate panes with Vim-like keybindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Enable Vi mode for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Improve macOS clipboard integration
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
